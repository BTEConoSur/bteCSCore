# Usar MiniMessage para el formateo de textos de MC - https://webui.advntr.dev/
# Funcionamiento de los Placeholders:
# - En cada texto pueden aparecer %player.<atributo>%, %proyecto.<atributo>%, %pais.<atributo>%, %tipo.<atributo>%, %rango.<atributo>%, %division.<atributo>%.
#   Siempre cuando aparezca alguno de los anteriores, se puede acceder a cualquier atributo (Más detalle después) del objeto correspondiente en ese texto.
#   Si un texto no tiene al menos un Placeholder de un tipo en particular, entonces ese texto no admite ese tipo de objeto.
#   En caso de borrar manualmente todos los Placeholders de un texto, marcar qué tipo de objeto admite ese texto para poder recordarlo.

# - Tambíén en un mismo texto puede aparecer %player.<atributo>.1%, %player.<atributo>.2%, ... .
#   En este caso, es un texto que admite varios objetos de un mismo tipo. El orden es el cuál se ingresa por código (No cambiable) y no dentro del texto.
#   Por lo que %player.<atributo>.1% se puede referir al Lider de un proyecto y %player.<atributo>.2% a un Staff en particular, pudiendose mover estos Placeholders libremente en el mismo texto.

# - Por último, hay algunos Placeholders que son contextuales, es decir, no pertenecen a un objeto en particular, sino que se refieren a un valor específico dependiendo del contexto.
#   Por ejemplo, %plugin-prefix% se refiere al prefijo del plugin y sólo se puede usar (o quitar) en los textos que se usa.

# - Los atributos son aprueba de errores, en caso de encontrar algún error reportarlo.

# Los <atributos> disponibles para cada tipo de objeto son los siguientes:
# Player: (%player.<atributo>%)
#     nombre, nombrePublico, uuid, lenguaje, paisPrefix, tipoUsuario, rangoUsuario, tipoUsuarioPrefijo, rangoUsuarioPrefijo, discordName, proyectosActivos, proyectosCompletados, 
#     fechaIngreso, fechaUltimaConexion, estado (Online/Offline), discordId, discordName.
# Proyecto: %proyecto.<atributo>%
#     id, nombre, descripcion, tamano (Tamaño), paisId, paisNombre, tipoId, tipo, lider (Nombre Público), miembrosCantidad, fechaCreacion, fechaFinalizacion, maxMiembros, divisionId
#     divisionNombre, divisionGna, divisionFna, divisionNam, divisionContexto, geoCoords.
# País: %pais.<atributo>%
#     id, nombre, nombrePublico, dsIdGuild, dsIdGlobalChat, dsIdCountryChat, dsIdLog, dsIdRequest, logo (No aplicable en textos de MC).
# Rango de Usuario: %rango.<atributo>%
#     id, nombre, prefijo.
# Tipo de Usuario: %tipo.<atributo>%
#     id, nombre, prefijo, cantProyecSim.
# División: %division.<atributo>%
#     id, nombre, gna, fna, nam, contexto, paisId, paisNombre.

