# TAB
# Letras chicas: https://lingojam.com/MinecraftSmallFont
tab-prefix: " %player.paisPrefix%%player.prefix%"
tab-name: " <gold>%player.nombre%</gold>  "
tab-suffix: "<green>%ping%</green>"
tab-header:
  - "<b>                                                          <b>"
  - ""
  - ""
  - ""
  - "<reset>\ue238"
  - "<b>Welcome %player.nombre%!"
  - ""
tab-footer:
  - ""
  - "<yellow>Date: <white>%date%</white></yellow>"
  - "<yellow>Time: <white>%time%</white> (GMT-3)</yellow>"
  - ""
  - "<gray>%btecs_currentTip%</gray>"
  - ""
tips:
  - "Too much stuff on your screen? Use /config to customize your experience!"
  - "Did you know you can change chat channels? Use /chat to see what channels are available!"
  - "Want to go somewhere? Use /tpdir to teleport to a certain address or location!"
  - "Want to change your nick? Use /nickname to change how you appear to other players!"
  - "Don't know where you're at? Use /whereiam to get your location!"
  - "Did you know that a sausage is 70% salt?"
  - "Use /language to change your language"
  - "Need help? Use /help"
# Scoreboard
scoreboard-player:
  title: "<gold>%player.nombre%</gold>"
  lines:
    - "Role: <yellow>%player.rangoUsuario%</yellow>"
    - "Type: <yellow>%player.tipoUsuario%</yellow>"
    - "Country: %player.paisPrefix%"
    - "Discord: <yellow>%player.discordName%</yellow>"
    - "Language: <yellow>%player.lenguaje%</yellow>"
    - "Chat: <yellow>%player.chat%</yellow>"
    - ""
    - "<yellow>Projects</yellow>"
    - "- Active: %player.proyectosActivos%"
    - "- Finished: %player.proyectosCompletados%"
    - "- Editing: %player.proyectosEditando%"
scoreboard-proyecto:
  title: "<gold>%proyecto.id%</gold>"
  lines:
    - "Name: <yellow>%proyecto.nombre%</yellow>"
    - "State: <yellow>%proyecto.estado%</yellow>"
    - "Owner: <yellow>%proyecto.lider%</yellow>"
    - "Members: <yellow>%proyecto.miembrosCantidad%</yellow>"
    - "Size: <yellow>%proyecto.tamano%m²</yellow>"
    - "Country: <yellow>%proyecto.paisNombre%</yellow>"
    - "Type: <yellow>%proyecto.tipo%</yellow>"
scoreboard-no-proyecto:
  title: "<gold>N/A</gold>"
  lines:
    - "There are no projects"
    - "in this area."
scoreboard-multiple-proyectos:
  title: "<gold>Projects:</gold>"
  lines: "<yellow>%proyecto.id% - %proyecto.nombre%</yellow>"
scoreboard-online:
  title: "%plugin-prefix%" # Se puede usar %plugin-prefix%.
  lines:
    - "Total: <yellow>%onlinePlayers%</yellow>"
    - ""
    - "Argentina: <yellow>%argentinaPlayers%</yellow>"
    - "Bolivia: <yellow>%boliviaPlayers%</yellow>"
    - "Chile: <yellow>%chilePlayers%</yellow>"
    - "Paraguay: <yellow>%paraguayPlayers%</yellow>"
    - "Peru: <yellow>%peruPlayers%</yellow>"
    - "Uruguay: <yellow>%uruguayPlayers%</yellow>"
    - "Antarctica: <yellow>%antartidaPlayers%</yellow>"
