help-visitar:  # En cualquier línea se puede usar %plugin-prefix%
  using-coords:
    - "\n<dark_gray>+---------------------------------------+</dark_gray>"
    - "<gold>Teleport to any place using its coordinates</gold>"
    - "Command: <blue><i>/tpll <lat> <long></i></blue> <red><yellow><b><hover:show_text:'You can get the coordinate by right clicking on Google Maps.'>🛈</hover></b></yellow></red>"
    - "Example: <blue><i>/tpll -33.44433846551859, -70.65359965216298</i></blue>"
    - "<dark_gray>+---------------------------------------+</dark_gray>\n"
  using-address:
    - "\n<dark_gray>+---------------------------------------+</dark_gray>"
    - "<gold>Teleport to any location using its name or address</gold>"
    - "Command: <blue><i>/tpdir <place or address></i></blue>"
    - "Example: <blue><i>/tpdir Obelisco, Buenos Aires</i></blue> or"
    - "<blue><i>/tpdir Av. Corrientes 1047, Buenos Aires, Argentina</i></blue>"
    - "<dark_gray>+---------------------------------------+</dark_gray>\n"
  tour:
    - "\n<dark_gray>+---------------------------------------+</dark_gray>"
    - "<gold>Go on a sightseeing tour of iconic places</gold>"
    - "Available tours: <blue><i>/tour list</i></blue>"
    - "Start the tour: <blue><i>/tour <tour></i></blue>"
    - "Example: <blue><i>/tour peru</i></blue>"
    - "<dark_gray>+---------------------------------------+</dark_gray>\n"
  warps:
    - "\n<dark_gray>+---------------------------------------+</dark_gray>"
    - "<gold>Teleport to built locations</gold>"
