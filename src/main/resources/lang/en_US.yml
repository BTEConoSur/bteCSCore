help-command:
  header: "\n <b>=========</b> <gold>Help for Command</gold> <b>=========</b>"
  info: "<light_purple>Field: <gray>Required <></gray> - <gray>Optional [] </gray> - <gray>Options A|B </gray></light_purple>"
  usage: "<yellow>Usage:</yellow> /%comando% %args%" # %command% -> Full command. %args% -> Command arguments.
  aliases: "<yellow>Aliases:</yellow> %aliases%" # %aliases% -> List of command aliases.
  description: "<yellow>Description:</yellow> %description%" # %description% -> Command description.
  subcommands-title: "<yellow>Options</yellow>"
  subcommand-line-1: " - <gold>/%comando% %subcomando%%args%</gold>:" # %command% -> Root command. %subcommands% -> Subcommands. %args% -> Subcommand arguments. (Ask why but subcommand and args go together)
  subcommand-line-2: "   <yellow>Description:</yellow> <white>%description%</white>" # %description% -> Subcommand description.
  subcommand-line-3: "   <yellow>Aliases:</yellow> <white>%aliases%</white>" # %aliases% -> Subcommand aliases.
  backtext: "<b><<<</b>"
  backhover: "<gold>Previous Page</gold>"
  nexttext: "<b>>>></b>"
  nexthover: "<gold>Next Page</gold>"
  footer: " <b>=========</b> <gold><backtext> Page <yellow>%currentPage% of %totalPages%</yellow> <nexttext></gold> <b>=========</b>\n" # <backText> -> Text to go to previous page (if applicable). %currentPage% -> Current page. %totalPages% -> Total pages. <nextText> -> Text to go to next page (if applicable).

global-help-command:
  header: "\n <b>=========</b> <gold>Help for %plugin-prefix%</gold> <b>=========</b>" # %plugin-prefix% -> Plugin prefix.
  info: "<light_purple>Field: <gray>Required <></gray> - <gray>Optional [] </gray> - <gray>Options A|B </gray></light_purple>"
  commands-title: "<yellow>Available commands:</yellow>"
  command-line-1: " - <gold>/%comando%%args%</gold>" # %comando% -> Command. %args% -> Command arguments.
